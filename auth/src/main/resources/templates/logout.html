<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>退出登录 - 谷粒商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* 顶部logo区域 */
        header {
            width: 1200px;
            margin: 0 auto;
            padding: 30px 0 20px;
            overflow: hidden;
        }
        header .logo {
            float: left;
        }
        header .logo img {
            vertical-align: middle;
        }
        header .desc {
            float: left;
            font-size: 22px;
            font-weight: 400;
            color: #e4393c;
            margin: 8px 0 0 15px;
            padding-left: 15px;
            border-left: 1px solid #ccc;
        }
        header .top-right {
            float: right;
            font-size: 14px;
            margin-top: 15px;
        }
        header .top-right a {
            color: #666;
            text-decoration: none;
        }
        header .top-right a:hover {
            color: #e4393c;
        }
        header .top-right span {
            margin: 0 8px;
            color: #ddd;
        }

        /* 主内容卡片 */
        .main-content {
            width: 1200px;
            margin: 20px auto 50px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* 提示区域 */
        .logout-box {
            text-align: center;
            padding: 70px 20px 60px;
        }
        .logout-icon {
            font-size: 72px;
            color: #4caf50;
            margin-bottom: 20px;
        }
        .logout-box h2 {
            font-size: 28px;
            font-weight: 500;
            color: #222;
            margin-bottom: 15px;
        }
        .logout-box p {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
        }
        .action-buttons a {
            display: inline-block;
            padding: 10px 30px;
            margin: 0 10px;
            font-size: 16px;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background-color: #e4393c;
            color: #fff;
            border: 1px solid #e4393c;
        }
        .btn-primary:hover {
            background-color: #c81623;
            border-color: #c81623;
        }
        .btn-default {
            background-color: #fff;
            color: #e4393c;
            border: 1px solid #e4393c;
        }
        .btn-default:hover {
            background-color: #fef0f0;
        }

        /* 底部 */
        footer {
            width: 1200px;
            margin: 30px auto 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        footer ul {
            list-style: none;
            margin-bottom: 12px;
        }
        footer ul li {
            display: inline-block;
            margin: 0 8px;
        }
        footer ul li a {
            color: #999;
            text-decoration: none;
        }
        footer ul li a:hover {
            color: #e4393c;
        }
        footer .copyright {
            color: #aaa;
        }
        hr {
            width: 1200px;
            margin: 0 auto;
            border: none;
            border-top: 1px solid #eaeaea;
        }
    </style>
</head>
<body>

<!-- 头部区域，与login.html风格保持一致 -->
<header>
    <div class="logo">
        <a href="http://gulimall.com/">
            <img src="/static/login/JD_img/logo.jpg" alt="谷粒商城">
        </a>
    </div>
    <div class="desc">安全退出</div>
    <div class="top-right">
        <a href="http://gulimall.com/">返回首页</a>
        <span>|</span>
        <a href="http://auth.gulimall.com/login.html">重新登录</a>
    </div>
</header>

<!-- 主要内容卡片 -->
<div class="main-content">
    <div class="logout-box">
        <div class="logout-icon">✓</div>
        <h2>您已成功退出登录</h2>
        <p>感谢您使用谷粒商城，期待您的再次光临！</p>
        <div class="action-buttons">
            <a href="http://gulimall.com/" class="btn-primary">去购物首页</a>
            <a href="http://auth.gulimall.com/login.html" class="btn-default">重新登录</a>
        </div>
    </div>
</div>

<!-- 底部，与reg.html风格近似 -->
<hr>
<footer>
    <ul>
        <li><a href="#">关于我们</a></li>
        <li class="little">|</li>
        <li><a href="#">联系我们</a></li>
        <li class="little">|</li>
        <li><a href="#">人才招聘</a></li>
        <li class="little">|</li>
        <li><a href="#">商家入驻</a></li>
        <li class="little">|</li>
        <li><a href="#">广告服务</a></li>
        <li class="little">|</li>
        <li><a href="#">手机谷粒商城</a></li>
        <li class="little">|</li>
        <li><a href="#">友情链接</a></li>
        <li class="little">|</li>
        <li><a href="#">销售联盟</a></li>
        <li class="little">|</li>
        <li><a href="#">谷粒商城社区</a></li>
        <li class="little">|</li>
        <li><a href="#">谷粒商城公益</a></li>
        <li class="little">|</li>
        <li><a href="#">English Site</a></li>
    </ul>
    <div class="copyright">Copyright &copy; 2004-2026 谷粒商城gulimall.com 版权所有</div>
</footer>

<!-- 可选：几秒后自动跳转 -->
<script>
    // 5秒后自动跳转到首页，如不需要可删除该段
    setTimeout(function() {
        window.location.href = "http://gulimall.com/";
    }, 5000);
</script>
</body>
</html>
